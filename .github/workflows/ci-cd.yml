name: ci-cd

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build frontend and backend
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Build Docker images
        run: docker compose build

      - name: Simulated deploy
        run: echo "Deploy step can push images and trigger infrastructure rollout here."
